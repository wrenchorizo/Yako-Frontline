<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakApp Multi-Verso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: white; min-height: 100vh; }
        .active-tab { background: #4f46e5; border-radius: 12px; }
        .hidden { display: none; }
        input::placeholder { color: #4b5563; }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <div id="auth-screen" class="fixed inset-0 bg-gray-950 z-[300] flex items-center justify-center p-6">
        <div class="bg-gray-900 p-8 rounded-3xl border border-indigo-500 max-w-sm w-full shadow-2xl">
            <h1 class="text-3xl font-black text-indigo-500 text-center mb-8 italic italic">YAKAPP</h1>
            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="Nombre de usuario" class="w-full bg-black p-4 rounded-xl border border-gray-800 outline-none focus:border-indigo-500 text-white">
                <input type="password" id="auth-pass" placeholder="Contraseña" class="w-full bg-black p-4 rounded-xl border border-gray-800 outline-none focus:border-indigo-500 text-white">
                <button onclick="handleAuth('login')" class="w-full bg-indigo-600 py-4 rounded-xl font-black hover:bg-indigo-500 transition">ENTRAR</button>
                <button onclick="handleAuth('register')" class="w-full text-indigo-400 font-bold text-sm">¿No tienes cuenta? Regístrate</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden flex flex-col md:flex-row w-full min-h-screen">
        
        <nav class="bg-gray-900 w-full md:w-64 p-4 flex md:flex-col justify-around md:justify-start gap-4 border-r border-gray-800 fixed bottom-0 md:relative z-50 h-[70px] md:h-screen">
            <h1 class="hidden md:block text-2xl font-black text-indigo-500 mb-10 text-center">YAKAPP</h1>
            <button onclick="changeTab('harem')" class="tab-btn flex items-center gap-3 p-3 active-tab w-full"><i class="fas fa-gem"></i> <span class="hidden md:inline font-bold">Harem</span></button>
            <button onclick="changeTab('mundo')" class="tab-btn flex items-center gap-3 p-3 w-full"><i class="fas fa-globe"></i> <span class="hidden md:inline font-bold">Mundo</span></button>
            <button onclick="changeTab('social')" class="tab-btn flex items-center gap-3 p-3 w-full"><i class="fas fa-users"></i> <span class="hidden md:inline font-bold">Social</span></button>
            <button onclick="logout()" class="flex items-center gap-3 p-3 w-full text-red-500 mt-auto mb-4"><i class="fas fa-sign-out-alt"></i> <span class="hidden md:inline font-bold">Cerrar Sesión</span></button>
        </nav>

        <main class="flex-1 flex flex-col pb-[80px] md:pb-0 h-screen overflow-y-auto">
            <header class="bg-gray-900/80 p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 z-40 backdrop-blur-md">
                <div class="font-black text-gray-300" id="user-display">Usuario</div>
                <div class="bg-black/50 px-4 py-2 rounded-full border border-green-500/30 flex items-center gap-2">
                    <span class="text-green-400 font-mono font-bold" id="user-money">$0</span>
                    <i class="fas fa-coins text-yellow-500"></i>
                </div>
            </header>

            <section id="tab-harem" class="p-6">
                <div class="max-w-4xl mx-auto mb-8">
                    <button id="btn-invocar" class="w-full py-5 bg-gradient-to-r from-indigo-600 to-purple-600 font-black rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all mb-6">
                        🌀 INVOCAR PERSONAJE
                    </button>
                    <input type="text" id="buscador" placeholder="Buscar en mi colección..." class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none focus:border-indigo-500">
                </div>
                <div id="harem-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            </section>

            <section id="tab-mundo" class="hidden p-10 text-center"><h2 class="text-2xl font-bold">Mundo (Próximamente)</h2></section>
            <section id="tab-social" class="hidden p-10 text-center"><h2 class="text-2xl font-bold">Social (Próximamente)</h2></section>
        </main>
    </div>

    <div id="modal-container" class="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-[400] opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-gray-900 p-6 rounded-3xl border-2 border-indigo-500 text-center max-w-sm w-full shadow-[0_0_50px_rgba(79,70,229,0.3)]">
            <img id="modal-imagen" src="" class="w-full max-h-[50vh] object-contain rounded-xl mb-4">
            <h2 id="modal-nombre" class="text-2xl font-black uppercase italic"></h2>
            <button onclick="cerrarModal()" class="w-full bg-white text-black font-black py-4 rounded-xl mt-6 hover:bg-gray-200">¡GENIAL!</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
