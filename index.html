<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakApp Multi-Verso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: white; min-height: 100vh; font-family: sans-serif; overflow-x: hidden; }
        .active-tab { background: #4f46e5 !important; color: white !important; border-radius: 12px; }
        .tab-btn { transition: all 0.2s; }
        .gacha-card { transition: all 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .gacha-card:hover { transform: translateY(-5px); border-color: #4f46e5; box-shadow: 0 10px 20px -10px rgba(79,70,229,0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <div id="auth-screen" class="fixed inset-0 bg-gray-950 z-[300] flex items-center justify-center p-6">
        <div class="bg-gray-900 p-8 rounded-3xl border border-indigo-500/50 max-w-sm w-full shadow-2xl">
            <h1 class="text-3xl font-black text-indigo-500 text-center mb-8 italic uppercase tracking-tighter">YakApp</h1>
            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="Usuario" class="w-full bg-black/50 p-4 rounded-xl border border-gray-800 outline-none focus:border-indigo-500 text-white">
                <input type="password" id="auth-pass" placeholder="Contraseña" class="w-full bg-black/50 p-4 rounded-xl border border-gray-800 outline-none focus:border-indigo-500 text-white">
                <button onclick="handleAuth('login')" class="w-full bg-indigo-600 py-4 rounded-xl font-black hover:bg-indigo-500 transition shadow-lg shadow-indigo-900/20">ENTRAR</button>
                <button onclick="handleAuth('register')" class="w-full text-gray-500 font-bold text-xs hover:text-indigo-400 transition">¿Eres nuevo? Crea una cuenta aquí</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden flex flex-col md:flex-row w-full min-h-screen">
        
        <nav class="bg-gray-900 w-full md:w-64 p-4 flex md:flex-col justify-around md:justify-start gap-2 border-r border-gray-800 fixed bottom-0 md:relative z-50 h-[70px] md:h-screen">
            <h1 class="hidden md:block text-2xl font-black text-indigo-500 mb-10 text-center italic">YAKAPP</h1>
            <button onclick="changeTab('harem', this)" class="tab-btn flex items-center gap-3 p-3 active-tab w-full"><i class="fas fa-gem"></i> <span class="hidden md:inline font-bold">Harem</span></button>
            <button onclick="changeTab('mundo', this)" class="tab-btn flex items-center gap-3 p-3 w-full text-gray-400 hover:text-white"><i class="fas fa-globe"></i> <span class="hidden md:inline font-bold">Mundo</span></button>
            <button onclick="changeTab('social', this)" class="tab-btn flex items-center gap-3 p-3 w-full text-gray-400 hover:text-white"><i class="fas fa-users"></i> <span class="hidden md:inline font-bold">Social</span></button>
            <button onclick="logout()" class="flex items-center gap-3 p-3 w-full text-red-500 mt-auto md:mb-4"><i class="fas fa-sign-out-alt"></i> <span class="hidden md:inline font-bold">Salir</span></button>
        </nav>

        <main class="flex-1 flex flex-col pb-[80px] md:pb-0 h-screen overflow-y-auto">
            <header class="bg-gray-900/80 p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 z-40 backdrop-blur-md">
                <div class="font-black text-indigo-400 text-sm uppercase tracking-widest" id="user-display">Cargando...</div>
                <div class="bg-black/50 px-4 py-2 rounded-full border border-green-500/30 flex items-center gap-2">
                    <span class="text-green-400 font-mono font-bold" id="user-money">$0</span>
                    <i class="fas fa-coins text-yellow-500"></i>
                </div>
            </header>

            <section id="tab-harem" class="p-4 md:p-8">
                <div class="max-w-4xl mx-auto mb-8">
                    <div class="bg-gray-900/50 p-6 rounded-3xl border border-indigo-500/20 mb-6">
                        <button id="btn-invocar" class="w-full py-5 bg-gradient-to-r from-indigo-600 to-purple-600 font-black rounded-2xl shadow-xl hover:scale-[1.01] active:scale-95 transition-all disabled:from-gray-700 disabled:to-gray-800 disabled:text-gray-500 disabled:cursor-not-allowed uppercase italic tracking-tighter">
                            🌀 Invocar Personaje
                        </button>
                        <p id="invocar-timer" class="text-[10px] text-center text-indigo-400 mt-2 uppercase tracking-widest font-bold italic">Portal Recargado</p>
                    </div>

                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-4 text-gray-500"></i>
                        <input type="text" id="buscador" placeholder="Filtrar por nombre..." class="w-full bg-gray-900 border border-gray-800 p-4 pl-12 rounded-2xl outline-none focus:border-indigo-500 text-sm">
                    </div>
                </div>
                
                <div id="harem-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-w-6xl mx-auto pb-10">
                    </div>
            </section>

            <section id="tab-mundo" class="hidden p-6 max-w-4xl mx-auto">
                <div class="bg-gradient-to-b from-gray-800 to-gray-950 rounded-3xl p-8 border border-indigo-500/30 text-center shadow-2xl">
                    <div class="mb-8">
                        <i class="fas fa-map-marked-alt text-6xl text-indigo-500 mb-4 animate-pulse"></i>
                        <h2 class="text-3xl font-black italic uppercase">Exploración</h2>
                        <p class="text-gray-400 text-sm mt-2">Envía a tus personajes a buscar botín.</p>
                    </div>

                    <div id="pantalla-espera" class="hidden py-10">
                        <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p class="text-indigo-400 font-bold uppercase tracking-widest">Explorando el Multiverso...</p>
                    </div>

                    <div id="controles-mundo">
                        <button id="btn-explorar" onclick="iniciarExploracion()" class="w-full py-6 bg-indigo-600 hover:bg-indigo-500 text-white font-black rounded-2xl text-xl shadow-lg transition-all active:scale-95 disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed">
                            ⚔️ INICIAR EXPEDICIÓN
                        </button>
                        <p id="cooldown-timer" class="text-[10px] text-indigo-400 mt-4 uppercase tracking-[0.2em] font-bold italic">¡Listo para la aventura!</p>
                    </div>
                </div>

                <div id="resultado-mundo" class="mt-6 space-y-4 h-[300px] overflow-y-auto pr-2">
                    </div>
            </section>

            <section id="tab-social" class="hidden p-20 text-center italic">
                <i class="fas fa-lock text-4xl mb-4 text-gray-700"></i>
                <h2 class="text-xl font-bold text-gray-600 uppercase">Próximamente...</h2>
            </section>
        </main>
    </div>

    <div id="modal-container" class="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-[400] opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-gray-900 p-6 rounded-3xl border-2 border-indigo-500 text-center max-w-sm w-full shadow-[0_0_100px_rgba(79,70,229,0.2)]">
            <p class="text-indigo-500 font-black text-xs mb-4 tracking-[0.3em] uppercase">¡Nueva Adquisición!</p>
            <img id="modal-imagen" src="" class="w-full max-h-[45vh] object-contain rounded-2xl mb-4 bg-black/20">
            <h2 id="modal-nombre" class="text-2xl font-black uppercase italic mb-1"></h2>
            <p id="modal-serie" class="text-gray-500 text-sm mb-6"></p>
            <button onclick="cerrarModal()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-indigo-100 transition shadow-lg">CONTINUAR</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
