<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakApp - Colección</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; }
        .gacha-shadow { box-shadow: 0 0 60px rgba(139, 92, 246, 0.4); }
    </style>
</head>
<body class="p-4 font-sans min-h-screen">
    
    <header class="text-center py-8">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-500 to-red-500">YAK APP</h1>
        <p class="text-gray-400 mt-2 tracking-widest uppercase text-xs">Sistema de Colección Gacha</p>
    </header>

    <div class="flex flex-col items-center mb-12">
        <button id="btn-invocar" class="group relative px-10 py-5 font-black text-white transition-all bg-gradient-to-br from-purple-600 to-blue-700 rounded-2xl hover:scale-105 active:scale-95 shadow-xl border-b-4 border-blue-900">
            🌀 INVOCAR PERSONAJE
        </button>
    </div>

    <div id="harem-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-w-6xl mx-auto">
        </div>

    <div id="modal-container" class="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="gacha-modal" class="bg-gray-900 p-6 rounded-3xl border-2 border-purple-500 text-center flex flex-col items-center w-full max-w-4xl gacha-shadow transform scale-90 transition-transform duration-300">
            
            <h3 class="text-purple-400 font-bold tracking-tighter text-xl mb-4">¡NUEVA ADQUISICIÓN!</h3>
            
            <div class="w-full flex justify-center bg-black/20 rounded-2xl p-2 mb-4">
                <img id="modal-imagen" src="" class="max-w-full max-h-[60vh] object-contain rounded-lg shadow-2xl" alt="Personaje">
            </div>
            
            <h2 id="modal-nombre" class="text-3xl font-black text-white uppercase italic"></h2>
            <p id="modal-serie" class="text-blue-400 font-bold mb-4"></p>
            
            <div class="flex gap-4 bg-gray-800 px-6 py-2 rounded-full mb-6">
                <span id="modal-nivel" class="text-yellow-500 font-bold"></span>
                <span class="text-gray-600">|</span>
                <span id="modal-valor" class="text-green-400 font-mono"></span>
            </div>

            <button id="modal-cerrar" class="w-full max-w-xs bg-white text-black font-black py-4 rounded-xl hover:bg-gray-200 transition">
                CONTINUAR
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
