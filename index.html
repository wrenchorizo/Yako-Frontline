<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakApp - Harem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .card-gold { border: 2px solid #fbbf24; box-shadow: 0 0 15px #fbbf24; }
    </style>
</head>
<body class="p-5">
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-yellow-500">YAK APP</h1>
        <p class="text-gray-400">Tu Harem Legendario</p>
    </header>
<div class="flex flex-col items-center justify-center mb-10 mt-6">
    <div id="invocacion-display" class="hidden mb-6 p-4 bg-gray-800 rounded-2xl border-2 border-purple-500 animate-bounce">
        <p class="text-purple-400 font-bold">✨ ¡NUEVO PERSONAJE DETECTADO! ✨</p>
    </div>
    
    <button id="btn-invocar" class="group relative px-8 py-4 font-bold text-white transition-all duration-200 bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 rounded-xl hover:scale-110 active:scale-95 shadow-[0_0_20px_rgba(147,51,234,0.5)]">
        <span class="flex items-center gap-2">
            🌀 INVOCAR PERSONAJE (Gacha)
        </span>
    </button>
    
    <p class="text-gray-500 text-xs mt-3 uppercase tracking-widest">Costo: 0 Monedas (Beta)</p>
</div>
    <div id="harem-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <p class="text-center col-span-full">Cargando personajes de la nube...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
