<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YakApp RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background: #05070a; color: white; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        
        /* HUD y Tipografía Reducida */
        .hud-text-xs { font-size: 0.6rem; }
        .hud-text-sm { font-size: 0.75rem; }
        
        /* Menú Plegable Universal */
        .sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 4rem; }
        .sidebar.expanded { width: 12rem; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; bottom: 0; position: fixed; flex-direction: row; }
            .sidebar.expanded { height: 200px; flex-direction: column; }
        }

        /* Fondo Pinterest Aventura */
        .bg-adventure { 
            background: linear-gradient(rgba(5,7,10,0.8), rgba(5,7,10,0.8)), 
                        url('https://i.pinimg.com/236x/69/81/c2/6981c251f5c5b623f800b011553762e3.jpg');
            background-size: cover; background-position: center;
        }

        .active-tab { background: #312e81; color: white !important; border-radius: 12px; }
        .glass { background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(12px); }
        .hidden { display: none !important; }
        
        /* Animación suave para notificaciones */
        #notificador { z-index: 9999; pointer-events: none; }
        .bg-portal { 
    background: linear-gradient(rgba(5,7,10,0.85), rgba(5,7,10,0.85)), 
                url('https://i.pinimg.com/236x/d2/e3/c6/d2e3c621e0474fe592547c199be0cf5b.jpg');
    background-size: cover; background-position: center;
}
.chat-box { height: 300px; overflow-y: auto; display: flex; flex-direction: column-reverse; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-full overflow-hidden">

    <div id="notificador" class="fixed top-4 right-4 space-y-2"></div>

    <div id="modal-logout" class="hidden fixed inset-0 z-[5000] glass flex items-center justify-center p-6">
        <div class="bg-gray-900 p-8 rounded-3xl border border-red-500/30 text-center max-w-xs w-full">
            <h3 class="font-black mb-6 uppercase hud-text-sm tracking-tight">¿Seguro de cerrar sesión?</h3>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="logoutReal()" class="bg-red-600 py-3 rounded-xl font-bold uppercase hud-text-xs">Sí, salir</button>
                <button onclick="cerrarModalLogout()" class="bg-gray-800 py-3 rounded-xl font-bold uppercase hud-text-xs">No, volver</button>
            </div>
        </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 bg-black z-[4000] flex items-center justify-center p-6">
        <div class="bg-gray-900 p-8 rounded-[2.5rem] border border-indigo-500/20 w-full max-w-sm text-center">
            <h1 class="text-3xl font-black text-indigo-500 mb-8 italic italic tracking-tighter">YAKAPP</h1>
            <input type="text" id="auth-user" placeholder="USUARIO" class="w-full bg-black p-4 rounded-xl mb-3 border border-gray-800 outline-none focus:border-indigo-500 hud-text-sm">
            <input type="password" id="auth-pass" placeholder="CONTRASEÑA" class="w-full bg-black p-4 rounded-xl mb-6 border border-gray-800 outline-none focus:border-indigo-500 hud-text-sm">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="handleAuth('login')" class="bg-indigo-600 py-3 rounded-xl font-black uppercase hud-text-sm">Entrar</button>
                <button onclick="handleAuth('register')" class="bg-gray-800 py-3 rounded-xl font-black uppercase hud-text-sm border border-gray-700">Unirse</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden flex flex-col md:flex-row w-full h-full">
        
        <nav id="sidebar" class="sidebar bg-gray-900/90 backdrop-blur-xl border-r border-gray-800 flex flex-col p-3 z-[100] transition-all">
            <button onclick="toggleSidebar()" class="w-full p-3 mb-6 text-indigo-400 hover:bg-indigo-500/10 rounded-xl transition-all">
                <i class="fas fa-bars text-xl"></i>
            </button>
            
            <div class="flex flex-col gap-3 flex-1">
                <button onclick="changeTab('harem', this)" class="tab-btn p-3 flex items-center gap-4 active-tab text-white transition-all">
                    <i class="fas fa-users text-lg"></i> <span class="nav-text hidden font-black uppercase hud-text-xs">Harem</span>
                </button>
                <button onclick="changeTab('mundo', this)" class="tab-btn p-3 flex items-center gap-4 text-gray-500 transition-all">
                    <i class="fas fa-khanda text-lg"></i> <span class="nav-text hidden font-black uppercase hud-text-xs">Aventura</span>
                </button>
                <button onclick="changeTab('invocacion', this)" class="tab-btn p-3 flex items-center gap-4 text-gray-500 transition-all">
                    <i class="fas fa-door-open text-lg"></i> <span class="nav-text hidden font-black uppercase hud-text-xs">Invocación</span>
                </button>
                <button onclick="changeTab('social', this)" class="tab-btn p-3 flex items-center gap-4 text-gray-500 transition-all">
    <i class="fas fa-comments text-lg"></i> <span class="nav-text hidden font-black uppercase hud-text-xs">Social</span>
</button>
            </div>

            <button onclick="confirmarLogout()" class="p-3 flex items-center gap-4 text-red-500 mt-auto transition-all">
                <i class="fas fa-power-off text-lg"></i> <span class="nav-text hidden font-black uppercase hud-text-xs">Salir</span>
            </button>
        </nav>

        <main class="flex-1 overflow-y-auto h-full pb-20 md:pb-0 bg-gray-950">
            <header class="p-4 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-gray-950/80 backdrop-blur z-40">
                <h2 id="user-display" class="font-black hud-text-sm italic uppercase">---</h2>
                <div class="text-right">
                    <p class="hud-text-xs text-green-500 font-bold uppercase tracking-widest">Balance</p>
                    <h2 id="user-money" class="font-black hud-text-sm">---</h2>
                </div>
            </header>

            <section id="tab-harem" class="p-4">
                <div id="harem-container" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3"></div>
            </section>

            <section id="tab-mundo" class="hidden h-full bg-adventure flex flex-col justify-center p-6">
                <div id="mundo-inactivo" class="bg-black/60 backdrop-blur-xl p-8 rounded-[2.5rem] border border-white/5 text-center max-w-sm mx-auto w-full shadow-2xl">
                    <h2 class="text-2xl font-black mb-1 uppercase italic tracking-tighter text-indigo-400">Expedición</h2>
                    <p class="text-gray-500 hud-text-xs mb-8 font-bold uppercase tracking-widest">Selecciona hasta 3 personajes</p>
                    <div id="slots-equipo" class="flex justify-center gap-3 mb-8">
                        <div class="w-16 h-16 border border-dashed border-gray-800 rounded-2xl flex items-center justify-center text-gray-800 font-black hud-text-sm">1</div>
                        <div class="w-16 h-16 border border-dashed border-gray-800 rounded-2xl flex items-center justify-center text-gray-800 font-black hud-text-sm">2</div>
                        <div class="w-16 h-16 border border-dashed border-gray-800 rounded-2xl flex items-center justify-center text-gray-800 font-black hud-text-sm">3</div>
                    </div>
                    <button onclick="iniciarExploracion()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black hud-text-sm shadow-xl shadow-indigo-500/20 active:scale-95 transition-all">ENVIAR EQUIPO</button>
                </div>

                <div id="mundo-activo" class="hidden bg-black/60 backdrop-blur-xl p-10 rounded-[2.5rem] border border-indigo-500/20 text-center max-w-sm mx-auto w-full">
                    <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                    <h3 class="text-indigo-400 font-black hud-text-sm mb-1 uppercase italic">Misión en curso</h3>
                    <div id="timer-mision" class="text-5xl font-black tracking-tighter italic">07:00</div>
                </div>
            </section>

          <section id="tab-invocacion" class="hidden h-full bg-portal flex flex-col justify-center p-6">
                <div class="bg-gray-900 p-8 rounded-[2.5rem] border border-gray-800 text-center shadow-xl">
                    <h2 class="text-2xl font-black mb-1 uppercase italic tracking-tighter">Portal</h2>
                    <p class="text-gray-500 hud-text-xs mb-8 font-bold uppercase tracking-widest">Ruleta Dimensional</p>
                    <div class="py-12 border border-gray-800 rounded-3xl mb-8 bg-black/40 flex items-center justify-center">
                        <i class="fas fa-door-open text-4xl text-gray-800"></i>
                    </div>
                    <button id="btn-invocar" onclick="intentarInvocacion()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black hud-text-sm shadow-xl shadow-indigo-500/20 active:scale-95 transition-all">INVOCAR</button>
                    <p id="invocar-timer" class="hud-text-xs text-gray-500 mt-4 font-black uppercase tracking-widest hidden"></p>
                </div>
            </section>
            <section id="tab-social" class="hidden p-4 h-full flex flex-col gap-4">
<div class="bg-gray-900 rounded-[2rem] border border-gray-800 p-4 flex-1 flex flex-col overflow-hidden">
    <div class="flex gap-2 mb-4">
        <button onclick="switchSocial('chat')" id="btn-tab-chat" class="flex-1 bg-indigo-600/20 py-2 rounded-xl hud-text-xs font-black">CHAT</button>
        <button onclick="switchSocial('usuarios')" id="btn-tab-users" class="flex-1 bg-gray-800 py-2 rounded-xl hud-text-xs font-black">BUSCAR</button>
    </div>

    <div id="social-chat" class="flex-1 flex flex-col">
        <div class="flex justify-between items-center mb-2 px-1">
            <p id="chat-target-label" class="text-[9px] text-indigo-400 font-black uppercase tracking-tighter">Chat Global</p>
            <button onclick="setChatTarget('global')" class="text-[9px] text-gray-500 font-black uppercase">Limpiar</button>
        </div>
        <div id="chat-container" class="chat-box space-y-2 p-2 mb-2 bg-black/20 rounded-2xl border border-white/5"></div>
        <div class="flex gap-2">
            <input type="text" id="chat-input" placeholder="Escribe..." class="flex-1 bg-black border border-gray-800 p-3 rounded-xl hud-text-xs outline-none">
            <button onclick="enviarMensaje()" class="bg-indigo-600 px-4 rounded-xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="social-usuarios" class="hidden flex-1 flex flex-col gap-3">
        <input type="text" id="user-search-input" oninput="buscarUsuarios()" placeholder="BUSCAR USUARIO..." class="w-full bg-black border border-indigo-500/30 p-3 rounded-xl hud-text-xs outline-none text-white font-black">
        <div id="usuarios-lista" class="flex-1 overflow-y-auto space-y-2"></div>
    </div>
</div>
</section>
        </main>
    </div>

    <div id="modal-detalles" class="hidden fixed inset-0 z-[2000] glass flex items-center justify-center p-4">
        <div class="bg-gray-900 w-full max-w-xs rounded-[2.5rem] border border-white/5 overflow-hidden shadow-2xl relative">
            <button onclick="cerrarDetalles()" class="absolute top-5 right-5 text-gray-600 hover:text-white"><i class="fas fa-times"></i></button>
            <div class="p-6 flex flex-col items-center text-center">
                <img id="det-img" src="" class="w-32 h-32 object-contain mb-4 drop-shadow-[0_0_15px_rgba(79,70,229,0.3)]">
                <p id="det-fuente" class="text-indigo-400 font-black hud-text-xs uppercase tracking-widest mb-1">---</p>
                <h2 id="det-nombre" class="text-xl font-black uppercase italic mb-6">---</h2>
                
                <div class="w-full mb-6">
                    <div class="flex justify-between hud-text-xs font-black uppercase mb-1"><span>Stamina</span> <span id="det-stamina-text">0%</span></div>
                    <div class="w-full bg-black/50 h-2 rounded-full overflow-hidden border border-white/5">
                        <div id="det-stamina-bar" class="h-full bg-indigo-500 transition-all duration-500"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 w-full mb-6">
                    <div class="bg-black/40 p-3 rounded-xl border border-white/5">
                        <p class="hud-text-xs text-gray-500 uppercase font-black">Nivel</p>
                        <p id="det-nivel" class="font-bold text-yellow-500 hud-text-sm">--</p>
                    </div>
                    <div class="bg-black/40 p-3 rounded-xl border border-white/5">
                        <p class="hud-text-xs text-gray-500 uppercase font-black">Género</p>
                        <p id="det-genero" class="font-bold uppercase hud-text-sm text-indigo-300">--</p>
                    </div>
                </div>

                <div class="flex flex-col gap-2 w-full">
                    <button onclick="entrenarPj()" class="w-full bg-white text-black py-3 rounded-xl font-black uppercase hud-text-xs hover:bg-indigo-500 hover:text-white">Entrenar (-$500)</button>
                    <button id="btn-toggle-equipo" onclick="toggleEquipo()" class="w-full bg-indigo-600 py-3 rounded-xl font-black uppercase hud-text-xs shadow-lg shadow-indigo-500/10">Añadir al Equipo</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-invocacion" class="hidden fixed inset-0 z-[3000] glass flex items-center justify-center p-4">
        <div class="bg-gray-900 w-full max-w-xs rounded-[2.5rem] border border-white/5 overflow-hidden shadow-2xl p-6 text-center">
            <p id="inv-estado" class="text-yellow-400 font-black hud-text-xs uppercase tracking-widest mb-4">¡Invocación!</p>
            <img id="inv-img" src="" class="w-40 h-40 object-contain mb-4 mx-auto rounded-2xl bg-black/20">
            <h2 id="inv-nombre" class="text-2xl font-black uppercase italic mb-1">---</h2>
            <p id="inv-fuente" class="text-indigo-400 font-black hud-text-xs uppercase mb-6">---</p>
            <div id="inv-disponibilidad" class="p-3 rounded-xl border border-white/5 font-black hud-text-xs uppercase mb-6">---</div>
            <button onclick="cerrarInvocacion()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase hud-text-xs">Continuar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
