<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakApp - Harem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; scrollbar-gutter: stable; }
        .gacha-modal { box-shadow: 0 0 50px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body class="p-5 font-sans">
    
    <header class="text-center mb-8">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-600">YAK APP</h1>
        <p class="text-gray-400 text-sm">Tu Harem Legendario</p>
    </header>

    <div class="flex flex-col items-center justify-center mb-10 mt-6">
        <button id="btn-invocar" class="px-8 py-4 font-bold text-white transition-all duration-200 bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 rounded-xl hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(147,51,234,0.5)]">
            🌀 INVOCAR PERSONAJE (Gacha)
        </button>
        <p class="text-gray-500 text-xs mt-3 uppercase tracking-widest">Costo: 0 Monedas (Beta)</p>
    </div>

    <div id="harem-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 pb-20">
        <p id="harem-status" class="text-center col-span-full text-gray-400">Cargando tu harem...</p>
    </div>

    <div id="modal-container" class="fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50 transition-opacity duration-300 opacity-0 pointer-events-none">
        <div id="gacha-modal" class="bg-gray-950 p-8 rounded-3xl border-4 border-purple-500 text-center flex flex-col items-center max-w-sm w-full gacha-modal transform scale-90 transition-transform duration-300">
            
            <p class="text-3xl font-bold text-purple-300 mb-6 uppercase tracking-wider">¡INVOCACIÓN ÉPICA!</p>
            
            <img id="modal-imagen" src="" class="w-60 h-60 object-cover rounded-2xl mb-6 shadow-xl border-2 border-purple-400" alt="Personaje invocado">
            
            <h2 id="modal-nombre" class="text-3xl font-extrabold text-white mb-1">Star Butterfly</h2>
            <p id="modal-serie" class="text-xl text-blue-400 font-medium mb-6">Star vs las fuerzas del mal</p>
            
            <div id="modal-stats" class="bg-gray-900 rounded-xl px-4 py-3 flex gap-6 items-center mb-8 w-full justify-center">
                <span id="modal-nivel" class="text-2xl font-bold text-yellow-500">NV. 1</span>
                <span class="text-gray-600">|</span>
                <span id="modal-valor" class="text-2xl font-mono text-green-400">7800</span>
            </div>

            <button id="modal-cerrar" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-10 rounded-full text-lg shadow-lg">
                ACEPTAR Y CONTINUAR
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
