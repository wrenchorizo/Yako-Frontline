<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakApp RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #05070a; color: white; font-family: 'Inter', sans-serif; }
        .active-tab { background: #4f46e5; border-radius: 12px; }
        .gacha-card { transition: all 0.2s; border: 1px solid #1f2937; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">
    <div id="notificador" class="fixed top-5 right-5 z-[500] space-y-3 pointer-events-none"></div>

    <div id="auth-screen" class="fixed inset-0 bg-black z-[600] flex items-center justify-center p-6">
        <div class="bg-gray-900 p-8 rounded-3xl border border-indigo-500/30 w-full max-w-sm">
            <h1 class="text-3xl font-black text-center text-indigo-500 mb-6 italic">YAKAPP</h1>
            <input type="text" id="auth-user" placeholder="Usuario" class="w-full bg-black p-4 rounded-xl mb-4 border border-gray-800 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-black p-4 rounded-xl mb-6 border border-gray-800 outline-none">
            <button onclick="handleAuth('login')" class="w-full bg-indigo-600 py-4 rounded-xl font-bold uppercase">Entrar</button>
        </div>
    </div>

    <div id="game-screen" class="hidden flex flex-col md:flex-row w-full">
        <nav class="bg-gray-900 w-full md:w-64 p-4 border-r border-gray-800 flex md:flex-col gap-2">
            <button onclick="changeTab('harem', this)" class="tab-btn p-4 w-full text-left active-tab font-bold"><i class="fas fa-heart mr-2"></i>Harem</button>
            <button onclick="changeTab('mundo', this)" class="tab-btn p-4 w-full text-left font-bold text-gray-400"><i class="fas fa-map mr-2"></i>Mundo</button>
            <button onclick="logout()" class="p-4 mt-auto text-red-500 font-bold"><i class="fas fa-sign-out-alt mr-2"></i>Salir</button>
        </nav>

        <main class="flex-1 overflow-y-auto h-screen pb-20">
            <header class="p-6 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur">
                <span id="user-display" class="font-black text-indigo-400 uppercase tracking-tighter text-xl"></span>
                <span id="user-money" class="bg-green-600/20 text-green-400 px-4 py-2 rounded-full font-bold border border-green-500/20"></span>
            </header>

            <section id="tab-harem" class="p-6">
                <div id="harem-container" class="grid grid-cols-2 lg:grid-cols-4 gap-4"></div>
            </section>

            <section id="tab-mundo" class="hidden p-6 max-w-2xl mx-auto">
                <div id="mundo-inactivo" class="bg-gray-900 p-8 rounded-3xl border border-gray-800 text-center">
                    <h2 class="text-2xl font-black mb-4 uppercase italic">Exploración</h2>
                    <div id="slots-equipo" class="flex justify-center gap-4 mb-8">
                        <div class="w-20 h-20 border-2 border-dashed border-gray-700 rounded-2xl flex items-center justify-center text-gray-700">1</div>
                        <div class="w-20 h-20 border-2 border-dashed border-gray-700 rounded-2xl flex items-center justify-center text-gray-700">2</div>
                        <div class="w-20 h-20 border-2 border-dashed border-gray-700 rounded-2xl flex items-center justify-center text-gray-700">3</div>
                    </div>
                    <button id="btn-explorar" onclick="iniciarExploracion()" class="w-full bg-indigo-600 py-6 rounded-2xl font-black text-xl shadow-lg shadow-indigo-500/20">⚔️ ENVIAR EQUIPO</button>
                </div>

                <div id="mundo-activo" class="hidden bg-gray-900 p-12 rounded-3xl border border-green-500/30 text-center">
                    <div class="w-16 h-16 border-4 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                    <h3 class="text-green-400 font-black text-2xl mb-2">MISIÓN EN CURSO</h3>
                    <div id="timer-mision" class="text-5xl font-mono font-black">07:00</div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
